name: Accessibility Checks

# When to run this workflow
on:
  push:
    branches: [main, isaac-v6.x.x] # Run on pushes to main and your current branch
  pull_request:
    branches: [main] # Run on PRs targeting main

jobs:
  accessibility-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

        run: npx playwright install --with-deps chromium

      - name: Build site
        run: npm run build

      - name: Start dev server
        run: |
          npm run dev &
          # Wait for server to be ready
          npx wait-on http://localhost:5173 -t 30000

      - name: Run accessibility audit
        run: npm run audit

      - name: Run accessibility tests
        run: npm run test

      - name: Upload audit report
        if: always() # Upload even if tests fail
        uses: actions/upload-artifact@v4
        with:
          name: accessibility-audit-report
          path: accessibility-reports/
          retention-days: 30

      - name: Comment PR with audit results
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ Accessibility checks failed! Check the [workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details and download the audit report.'
            })
