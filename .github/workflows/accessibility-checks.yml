name: Accessibility Checks

# When to run this workflow
on:
  push:
    branches: [main, isaac-v6.x.x] # Run on pushes to main and your current branch
  pull_request:
    branches: [main] # Run on PRs targeting main

jobs:
  accessibility-audit:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Get your code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # Step 3: Install dependencies
      - name: Install dependencies
        run: npm install

      # Step 4: Install Playwright browsers (needed for aria-ease test)
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      # Step 5: Build the site
      - name: Build site
        run: npm run build

      # Step 6: Start dev server in background
      - name: Start dev server
        run: |
          npm run dev &
          # Wait for server to be ready
          npx wait-on http://localhost:5173 -t 30000

      # Step 7: Run aria-ease audit
      - name: Run accessibility audit
        run: npm run audit

      # Step 8: Run aria-ease contract tests
      - name: Run accessibility tests
        run: |
          set -o pipefail
          npm run test 2>&1 | tee component-contract-test-output.txt

      # Step 9: Upload audit report as artifact (so you can download and view it)
      - name: Upload audit report
        if: always() # Upload even if audits fail
        uses: actions/upload-artifact@v4
        with:
          name: accessibility-audit-report
          path: accessibility-reports/
          retention-days: 30

      # Step 10: Upload component contract test report as artifact (so you can download and view it)
      - name: Upload component contract test report
        if: always() # Upload even if component contract tests fail
        uses: actions/upload-artifact@v4
        with:
          name: component-contract-test-output
          path: component-contract-test-output.txt
          retention-days: 30

      # Step 11: Comment on PR with results (optional but cool)
      - name: Comment PR with audit and component contract test results
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ Accessibility checks failed! Check the [workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details and download the reports.'
            })
