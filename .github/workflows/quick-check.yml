name: Quick Accessibility Check

# Faster check that only runs aria-ease test (not full audit)
# Good for quick feedback during development

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'src/**'  # Only run when source files change
      - 'package.json'
      - 'ariaease.config.js'

jobs:
  quick-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install Playwright
        run: npx playwright install --with-deps chromium
      
      - name: Start dev server
        run: |
          npm run dev &
          npx wait-on http://localhost:5173 -t 30000
      
      - name: Run aria-ease tests
        run: npm run test
